# 메트릭 서버 설치
# kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: member-hpa
  namespace: soldesk
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: member-depl
  minReplicas: 1
  maxReplicas: 5
  
  metrics:
  - type: Resource  
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50

  #- type: Resource  
   # resource:
    #  name: memory
     # target:
      #  type: Utilization
       # averageUtilization: 30
